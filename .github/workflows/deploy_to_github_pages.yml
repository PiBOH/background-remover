name: Deploy Streamlit to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22' # Richiesto dall'ultima versione di stlite

      - name: Build static site with stlite
        run: |
          # Creiamo un file requirements specifico per il browser
          # Rimuoviamo onnxruntime perché stlite lo gestisce internamente
          echo "rembg" > requirements-stlite.txt
          echo "pillow" >> requirements-stlite.txt

          # Esportiamo l'app usando il nuovo pacchetto @stlite/cli
          # Il comando corretto è 'web'
          npx @stlite/cli web . \
            --entrypoint bg_remover.py \
            --requirements requirements-stlite.txt \
            --out dist

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
