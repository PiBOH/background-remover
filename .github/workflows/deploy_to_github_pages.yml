name: Deploy Streamlit to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create static site
        run: |
          # 1. Creiamo la cartella di output
          mkdir -p dist

          # 2. Creiamo lo script di costruzione separato per evitare errori YAML
          cat << 'EOF' > build_app.py
          import json
          import os

          # Leggiamo il codice originale
          with open('bg_remover.py', 'r') as f:
              original_code = f.read()

          # Prepariamo il codice "Wrapper" con la barra di caricamento
          wrapper_code = r"""
          import streamlit as st
          import os
          import urllib.request
          from pathlib import Path
          import time

          def ensure_model_exists():
              model_dir = Path("/home/pyodide/.u2net")
              model_path = model_dir / "u2net.onnx"
              if not model_path.exists():
                  st.info("🚀 First time setup: Downloading AI Model (175MB)...")
                  model_dir.mkdir(parents=True, exist_ok=True)
                  progress_bar = st.progress(0)
                  status_text = st.empty()
                  def report(block_num, block_size, total_size):
                      downloaded = block_num * block_size
                      if total_size > 0:
                          percent = min(int(downloaded * 100 / total_size), 100)
                          progress_bar.progress(percent)
                          status_text.text(f"Progress: {percent}% ({downloaded // (1024*1024)}MB / {total_size // (1024*1024)}MB)")
                  
                  url = "https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx"
                  urllib.request.urlretrieve(url, model_path, reporthook=report)
                  st.success("✅ Download complete! Starting app...")
                  time.sleep(1)
                  st.session_state["model_ready"] = True
                  st.rerun()

          if "model_ready" not in st.session_state:
              ensure_model_exists()
              st.session_state["model_ready"] = True

          # --- START ORIGINAL APP ---
          """.replace('          ', '') + original_code

          # Template HTML
          html_template = """
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>AI Background Remover</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.css">
            <style>
              body { background: #0e1117; color: white; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
              #l { text-align: center; }
              .s { width: 50px; height: 50px; border: 5px solid #333; border-top: 5px solid #ff4b4b; border-radius: 50%; animation: r 1s linear infinite; margin: 0 auto 20px; }
              @keyframes r { to { transform: rotate(360deg); } }
            </style>
          </head>
          <body>
            <div id="l"><div class="s"></div><p>INITIALIZING ENGINE...</p></div>
            <div id="root"></div>
            <script type="module">
              import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.js";
              mount({
                requirements: ["rembg", "pillow"],
                entrypoint: "bg_remover.py",
                files: { "bg_remover.py": {{CODE}} }
              }, document.getElementById("root")).then(() => {
                document.getElementById('l').style.display = 'none';
              });
            </script>
          </body>
          </html>
          """
          
          with open('dist/index.html', 'w') as f:
              f.write(html_template.replace("{{CODE}}", json.dumps(wrapper_code)))
          EOF

          # 3. Eseguiamo lo script
          python3 build_app.py

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
