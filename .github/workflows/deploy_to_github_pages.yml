name: Deploy Streamlit to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          # Usiamo Python per creare l'index.html finale iniettando entrambi i file
          python3 << 'EOF'
          import json
          import os

          # Leggiamo i due file python
          with open('bg_remover.py', 'r') as f:
              bg_code = f.read()
          with open('first-run-github-pages.py', 'r') as f:
              loader_code = f.read()

          html_template = """
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>AI Background Remover</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.css">
            <style>
              body { background: #0e1117; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: sans-serif; }
              .spinner { width: 40px; height: 40px; border: 4px solid #333; border-top: 4px solid #ff4b4b; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
              @keyframes spin { to { transform: rotate(360deg); } }
            </style>
          </head>
          <body>
            <div id="loader"><div class="spinner"></div><p>LOADING SYSTEM...</p></div>
            <div id="root"></div>
            <script type="module">
              import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.js";
              
              mount({
                requirements: ["rembg", "pillow"],
                entrypoint: "first-run-github-pages.py",
                files: {
                  "bg_remover.py": {{BG_CODE}},
                  "first-run-github-pages.py": {{LOADER_CODE}}
                }
              }, document.getElementById("root")).then(() => {
                document.getElementById('loader').style.display = 'none';
              });
            </script>
          </body>
          </html>
          """
          
          # Iniezione sicura
          final_html = html_template.replace("{{BG_CODE}}", json.dumps(bg_code))
          final_html = final_html.replace("{{LOADER_CODE}}", json.dumps(loader_code))
          
          with open('dist/index.html', 'w') as f:
              f.write(final_html)
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
