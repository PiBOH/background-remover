name: Deploy Streamlit to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Prepare static site
        run: |
          mkdir -p dist
          python3 << 'EOF'
          import json
          import os

          with open('bg_remover.py', 'r') as f:
              bg_code = f.read()
          with open('first-run-github-pages.py', 'r') as f:
              loader_code = f.read()

          html_template = """
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="UTF-8">
            <title>AI Background Remover</title>
            <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.css">
            <style>
              body { background: #0e1117; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; font-family: 'Courier New', monospace; }
              #loader { width: 80%; max-width: 600px; text-align: center; }
              .progress-bg { width: 100%; background: #333; border-radius: 10px; height: 20px; margin: 20px 0; overflow: hidden; }
              #progress-fill { width: 0%; background: #ff4b4b; height: 100%; transition: width 0.3s; }
              #console { width: 100%; background: #000; color: #0f0; padding: 15px; font-size: 13px; height: 200px; overflow-y: auto; border: 1px solid #444; border-radius: 5px; text-align: left; }
              .stats { font-size: 14px; margin-bottom: 10px; color: #aaa; }
            </style>
          </head>
          <body>
            <div id="loader">
              <h2 style="font-family: sans-serif;">PHASE 1: SYSTEM INITIALIZING</h2>
              <div class="stats" id="sys-stats">Estimating remaining time...</div>
              <div class="progress-bg"><div id="progress-fill"></div></div>
              <div id="console"></div>
            </div>
            <div id="root"></div>
            <script type="module">
              import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.js";
              const fill = document.getElementById('progress-fill');
              const con = document.getElementById('console');
              const stats = document.getElementById('sys-stats');
              
              const log = (m) => {
                const d = document.createElement('div');
                d.textContent = `[${new Date().toLocaleTimeString()}] > ${m}`;
                con.appendChild(d);
                con.scrollTop = con.scrollHeight;
              };

              // Simulazione progresso fase 1 (il sistema carica in circa 30s)
              let p = 0;
              let startTime = Date.now();
              const interval = setInterval(() => {
                if (p < 95) {
                  p += (100 - p) * 0.05;
                  fill.style.width = p + '%';
                  const elapsed = (Date.now() - startTime) / 1000;
                  const totalEst = 30; // stima media di 30 secondi
                  const rem = Math.max(0, Math.round(totalEst - elapsed));
                  stats.textContent = `System Load: ${Math.round(p)}% | Estimated: ${rem}s remaining`;
                }
              }, 1000);

              log("Connecting to Pyodide WASM kernel...");
              log("Downloading Python dependencies (rembg, pillow)...");
              
              mount({
                requirements: ["rembg", "pillow"],
                entrypoint: "first-run-github-pages.py",
                files: {
                  "bg_remover.py": {{BG_CODE}},
                  "first-run-github-pages.py": {{LOADER_CODE}}
                }
              }, document.getElementById("root")).then(() => {
                clearInterval(interval);
                log("System ready! Handing over to Python loader...");
                setTimeout(() => { document.getElementById('loader').style.display = 'none'; }, 800);
              });
            </script>
          </body>
          </html>
          """
          
          final_html = html_template.replace("{{BG_CODE}}", json.dumps(bg_code))
          final_html = final_html.replace("{{LOADER_CODE}}", json.dumps(loader_code))
          
          with open('dist/index.html', 'w') as f:
              f.write(final_html)
          EOF
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
