name: Deploy Streamlit to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create static site
        run: |
          mkdir -p dist
          
          python3 << 'EOF'
          import json
          import os

          with open('bg_remover.py', 'r') as f:
              original_code = f.read()

          # Codice Python "potenziato" con download del modello
          wrapper_code = r"""
import streamlit as st
import os
import urllib.request
from pathlib import Path
import time

def ensure_model_exists():
    model_dir = Path("/home/pyodide/.u2net")
    model_path = model_dir / "u2net.onnx"
    
    if not model_path.exists():
        st.markdown("### 🚀 First time setup")
        st.info("Downloading AI Model (approx. 175MB). Please wait, this happens only once.")
        model_dir.mkdir(parents=True, exist_ok=True)
        
        progress_bar = st.progress(0)
        status_text = st.empty()
        
        url = "https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx"
        
        try:
            def report_progress(block_num, block_size, total_size):
                downloaded = block_num * block_size
                if total_size > 0:
                    percent = min(int(downloaded * 100 / total_size), 100)
                    progress_bar.progress(percent)
                    status_text.text(f"Status: Downloading... {percent}% ({downloaded // (1024*1024)}MB / {total_size // (1024*1024)}MB)")

            urllib.request.urlretrieve(url, model_path, reporthook=report_progress)
            
            st.success("✅ Model downloaded! Loading application...")
            time.sleep(1)
            st.session_state["model_ready"] = True
            st.rerun()
        except Exception as e:
            st.error(f"Error downloading model: {e}")
            st.stop()
    else:
        st.session_state["model_ready"] = True

if "model_ready" not in st.session_state:
    ensure_model_exists()
else:
    # --- CODICE ORIGINALE ---
""" + original_code

