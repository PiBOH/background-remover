name: Deploy Streamlit to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Build Script
        run: |
          cat << 'EOF' > build_app.py
          import json
          import os

          # Leggiamo il codice originale
          with open('bg_remover.py', 'r') as f:
              original_code = f.read()

          # Codice per la barra di caricamento e download modello
          wrapper_code = """
          import streamlit as st
          import os, urllib.request, time
          from pathlib import Path

          os.environ["U2NET_HOME"] = "/home/pyodide/.u2net"

          if "m_ready" not in st.session_state:
              p = Path("/home/pyodide/.u2net/u2net/u2net.onnx")
              if not p.exists():
                  st.info("🚀 First time setup: Downloading AI Model (175MB)...")
                  p.parent.mkdir(parents=True, exist_ok=True)
                  bar = st.progress(0)
                  def rep(bn, bs, ts):
                      if ts > 0: bar.progress(min(int(bn * bs * 100 / ts), 100))
                  urllib.request.urlretrieve("https://github.com/danielgatis/rembg/releases/download/v0.0.0/u2net.onnx", str(p), rep)
                  st.success("✅ Done! Loading app...")
                  time.sleep(1)
              st.session_state["m_ready"] = True
              st.rerun()
          """.replace('          ', '') + "\n" + original_code

          html = """
