name: Deploy Streamlit to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create static site
        run: |
          mkdir -p dist
          
          # Creiamo l'index.html iniettando il codice di bg_remover.py
          python3 << 'EOF'
          import json
          import os

          # Leggiamo il codice dell'app
          with open('bg_remover.py', 'r') as f:
              code = f.read()

          # Prepariamo il template HTML per stlite
          html_template = """
          <!DOCTYPE html>
          <html>
            <head>
              <meta charset="UTF-8" />
              <meta http-equiv="X-UA-Compatible" content="IE=edge" />
              <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
              <title>Background Remover</title>
              <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.css" />
            </head>
            <body>
              <div id="root"></div>
              <script type="module">
                import { mount } from "https://cdn.jsdelivr.net/npm/@stlite/browser@0.75.0/build/stlite.js";
                mount(
                  {
                    requirements: ["rembg", "pillow"],
                    entrypoint: "bg_remover.py",
                    files: {
                      "bg_remover.py": %s
                    },
                  },
                  document.getElementById("root"),
                );
              </script>
            </body>
          </html>
          """
          
          # Inseriamo il codice formattato correttamente come stringa JSON (per gestire escape e caratteri speciali)
          with open('dist/index.html', 'w') as f:
              f.write(html_template % json.dumps(code))
          EOF

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'dist'

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
